# ─────────────────────────────────────────────────────────────────────────────
# Backend CI/CD Pipeline — Task App
#
# Repo structure:  backend/  (Node.js + Express + Azure SQL, port 3001)
# Triggers on changes to backend/ folder on main or develop branches.
# Pattern: Build → Push to ACR → Deploy to Dev (develop) or Prod (main)
#
# Required variable group in Pipelines > Library:
#   taskapp-variables  (see README.md for the full list of variables)
#
# Required service connections in Project Settings > Service Connections:
#   acr-service-connection    (Docker Registry → your ACR)
#   azure-service-connection  (Azure Resource Manager → your subscription)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - backend/**
      - azure-pipelines/backend-pipeline.yml

pr: none

variables:
  - group: taskapp-variables          # Library variable group (Pipelines > Library)
  - name: imageTag
    value: $(Build.BuildId)           # Unique tag per build — enables rollback

# ── Stage 1: Build & Push Docker Image ───────────────────────────────────────
stages:
  - stage: Build
    displayName: 'Build and Push Backend Docker Image'
    jobs:
      - job: BuildJob
        displayName: 'Build Backend Image'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            displayName: 'Checkout source code'

          # Login to Azure Container Registry using the service connection
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: acr-service-connection

          # Build the backend Docker image — tagged with Build ID and 'latest'
          # Build ID tag enables rollback to any previous build
          - task: Docker@2
            displayName: 'Build Backend Image'
            inputs:
              command: build
              repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
              dockerfile: backend/Dockerfile
              buildContext: backend/
              tags: |
                $(imageTag)
                latest

          # Push both tags to ACR
          - task: Docker@2
            displayName: 'Push Backend Image to ACR'
            inputs:
              command: push
              repository: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME)
              tags: |
                $(imageTag)
                latest

# ── Stage 2: Deploy to Dev (develop branch only) ─────────────────────────────
# Automatically deploys when code is pushed to the develop branch
  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        displayName: 'Deploy Backend to Dev App Service'
        environment: 'development'    # Create this environment in Pipelines > Environments
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Backend to Dev App Service'
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(BACKEND_APP_NAME)-dev
                    containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)

# ── Stage 3: Deploy to Prod (main branch only) ───────────────────────────────
# Requires manual approval — configure in Pipelines > Environments > production
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        displayName: 'Deploy Backend to Prod App Service'
        environment: 'production'     # Approval gate is configured on this environment
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Backend to Prod App Service'
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(BACKEND_APP_NAME)
                    containers: $(DOCKER_REGISTRY)/$(BACKEND_IMAGE_NAME):$(imageTag)
