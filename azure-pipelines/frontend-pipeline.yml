# ─────────────────────────────────────────────────────────────────────────────
# Frontend CI/CD Pipeline — Task App
#
# Repo structure:  frontend/  (React + Create React App)
# Key facts:
#   - Build tool:   Create React App (react-scripts)
#   - Output dir:   frontend/build
#   - API env var:  REACT_APP_API_URL  (read via process.env in App.js)
#   - Served by:    Azure Static Web App (free tier, global CDN)
#
# Triggers on changes to frontend/ folder on main or develop branches.
# Pattern: Build React app → Deploy to Azure Static Web App
#
# Required variable group in Pipelines > Library:
#   taskapp-variables  (see README.md for the full list of variables)
#
# Required service connections:
#   acr-service-connection    (Docker Registry → your ACR)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - frontend/**
      - azure-pipelines/frontend-pipeline.yml

pr: none

variables:
  - group: taskapp-variables
  - name: imageTag
    value: $(Build.BuildId)

# ── Stage 1: Build & Push Frontend Docker Image ──────────────────────────────
# We build a Docker image (Nginx serving the React build) AND push it to ACR.
# This satisfies the lab requirement to show taskapp-frontend in ACR.
stages:
  - stage: Build
    displayName: 'Build Frontend Docker Image'
    jobs:
      - job: BuildJob
        displayName: 'Build and Push Frontend Image'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            displayName: 'Checkout source code'

          # Login to Azure Container Registry
          - task: Docker@2
            displayName: 'Login to ACR'
            inputs:
              command: login
              containerRegistry: acr-service-connection

          # Build the frontend Docker image.
          # REACT_APP_API_URL is passed as a build-arg so CRA bakes the
          # backend URL into the static bundle at build time.
          - task: Docker@2
            displayName: 'Build Frontend Image'
            inputs:
              command: build
              repository: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME)
              dockerfile: frontend/Dockerfile
              buildContext: frontend/
              arguments: '--build-arg REACT_APP_API_URL=$(REACT_APP_API_URL)'
              tags: |
                $(imageTag)
                latest

          # Push both the build-ID tag and 'latest' to ACR
          - task: Docker@2
            displayName: 'Push Frontend Image to ACR'
            inputs:
              command: push
              repository: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME)
              tags: |
                $(imageTag)
                latest

# ── Stage 2: Deploy Frontend Docker Image to App Service ─────────────────────
# Note: Azure Static Web Apps is blocked by the student subscription policy.
# The frontend Docker image (Nginx + React build) is deployed to App Service
# instead — functionally identical, same Dockerfile, same result.
  - stage: DeployFrontend
    displayName: 'Deploy Frontend to App Service'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployFrontendDev
        displayName: 'Deploy Frontend to Dev App Service'
        environment: 'development'
        pool:
          vmImage: 'ubuntu-latest'
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Frontend Image to Dev App Service'
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(FRONTEND_APP_NAME)-dev
                    containers: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME):$(imageTag)

      - deployment: DeployFrontendProd
        displayName: 'Deploy Frontend to Prod App Service'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy Frontend Image to Prod App Service'
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(FRONTEND_APP_NAME)
                    containers: $(DOCKER_REGISTRY)/$(FRONTEND_IMAGE_NAME):$(imageTag)
